<!DOCTYPE html>
<html>
<head>
  <title>LexChronos</title>
</head>
<body>
  <h1>LexChronos 📄</h1>

  <input type="file" id="pdfUpload" />
  <button onclick="processPDF()">Process</button>

  <pre id="output"></pre>

  <!-- PDF.js -->
  <script src="https://cdn.jsdelivr.net/npm/pdfjs-dist/build/pdf.min.js"></script>

  <!-- Tesseract -->
  <script src="https://cdn.jsdelivr.net/npm/tesseract.js@4/dist/tesseract.min.js"></script>

  <script>
    const backendURL = "https://lexchronos-backend.onrender.com/summarize";

    async function processPDF() {
      const file = document.getElementById("pdfUpload").files[0];

      if (!file) {
        alert("Please upload a PDF");
        return;
      }

      const arrayBuffer = await file.arrayBuffer();
      const pdf = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;

      let allText = "";

      for (let i = 1; i <= pdf.numPages; i++) {
        const page = await pdf.getPage(i);

        const textContent = await page.getTextContent();
        let text = textContent.items.map(item => item.str).join(" ");
        text = text.replace(/\s+/g, " ");

        // OCR fallback
        if (!text || text.length < 50) {
          const viewport = page.getViewport({ scale: 2 });
          const canvas = document.createElement("canvas");
          const context = canvas.getContext("2d");

          canvas.width = viewport.width;
          canvas.height = viewport.height;

          await page.render({ canvasContext: context, viewport }).promise;

          const { data: { text: ocrText } } = await Tesseract.recognize(canvas, "eng");
          text = ocrText;
        }

        allText += text + "\n";
      }

      // Extract dates
     const regex = /\b(
\d{1,2}[\/\-.]\d{1,2}[\/\-.]\d{2,4} |
\d{4}[\/\-.]\d{2}[\/\-.]\d{2} |
(?:Jan|Feb|Mar|Apr|May|Jun|Jul|Aug|Sep|Oct|Nov|Dec)[a-z]*[\s\-]\d{1,2},?[\s\-]\d{4} |
\d{1,2}[\s\-](?:Jan|Feb|Mar|Apr|May|Jun|Jul|Aug|Sep|Oct|Nov|Dec)[a-z]*[\s\-]\d{4}
)\b/gix;
      const matches = allText.match(regex) || [];

      if (matches.length === 0) {
        document.getElementById("output").innerText = "No dates found.";
        return;
      }

      // Send to backend
      const res = await fetch(backendURL, {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({
          textBatch: matches.slice(0, 20)
        })
      });

      const data = await res.json();

      document.getElementById("output").innerText = data.result;
    }
  </script>
</body>
</html>
